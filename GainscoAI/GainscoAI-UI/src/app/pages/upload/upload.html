<div class="card shadow">

  <div class="card-header">
    <h3>Upload PDF</h3>
  </div>

  <div class="card-body">

    <input
      class="form-control"
      type="file"
      accept=".pdf"
      (change)="onFileSelected($event)" />

    <button
      class="btn btn-primary mt-3"
      (click)="upload()">
      Upload
    </button>

  </div>

</div>
