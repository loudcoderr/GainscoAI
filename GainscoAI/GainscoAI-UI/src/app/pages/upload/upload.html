<div class="glass-card">

    <div class="upload-header">
        <h2>📄 Upload Document</h2>
        <p>Upload PDF documents to enrich your AI knowledge base.</p>
    </div>

    <input
        type="file"
        class="form-control mb-4"
        (change)="onFileSelected($event)">

    <button
        class="btn-upload"
        (click)="upload()">

        Upload Document

    </button>

</div>
