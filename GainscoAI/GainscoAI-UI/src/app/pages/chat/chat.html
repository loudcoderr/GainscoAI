<div class="chat-container">

    <div class="hero">


        <h3 class="heading">🤖 Nexus AI</h3>

    </div>

    <div class="chat-card">

        <div class="chat-header">

            <div>

                <h5>Ask your questions</h5>

                <small>
                    Responses are generated from your uploaded Docs.
                </small>

            </div>

        </div>

        <textarea
            rows="3"
            maxlength="1000"
            [(ngModel)]="question"
            placeholder="Example: Do Aliens Exist??">
        </textarea>

        <div class="bottom-row">

            <span class="counter">

                {{ question.length }} / 1000

            </span>

            <div class="button-group">

                <button
                    class="btn-clear"
                    type="button"
                    (click)="question='';answer=''">

                    Clear

                </button>

                <button
                    class="btn-ai"
                    (click)="ask()"
                    [disabled]="loading || !question.trim()">

                    <ng-container *ngIf="!loading">

                        ✨ Ask AI

                    </ng-container>

                    <ng-container *ngIf="loading">

                        <span class="spinner"></span>

                        Thinking...

                    </ng-container>

                </button>

            </div>

        </div>

    </div>

    <div class="answer-card" *ngIf="answer">

        <div class="answer-header">

            <div class="answer-icon">

                🤖

            </div>

            <div>

                <div class="answer-title">

                    Nexus AI Response

                </div>

                <small>
                    Generated using Azure OpenAI
                </small>

            </div>

        </div>

        <div class="answer">

            {{ answer }}

        </div>

    </div>

    <footer>

        © 2026 <strong>Nexus AI</strong> |
        Powered by Azure OpenAI • Azure AI Search 

        <br>

        Built by <strong>Amrit Raj</strong>

    </footer>

</div>
